name: Secret Migration Test

on:
  push:
    branches:
      - 'feature/*'

env:
  USE_MOCK: 'true'
  DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
  INVENTORY_API_KEY: ${{ secrets.INVENTORY_API_KEY }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  deploy-dev:
    name: Simulate Databricks Secret Usage
    runs-on: ubuntu-latest
    environment: Development 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Masked Secret
        run: |
          echo "Connecting to Databricks..."
          echo "Token: ${{ secrets.DATABRICKS_TOKEN }}"

      - name: Inject Secret Into Python
        run: python main.py